        circles = [];

            if (selectedSchool === "all" || item.school === selectedSchool) {
                var color = getColor(item.archetype);

                var circle = L.circle([item.lat, item.lon], {
                    radius: getRadius(item.level),
                    color: color,
                    fillColor: color,
                    fillOpacity: getOpacity(item.level),
                    weight: 2
